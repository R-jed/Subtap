name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f  # v4
      - run: brew install ffmpeg
      - name: Verify source and package
        run: ./scripts/check.sh
      - run: python -m venv /tmp/subtap-wheel-smoke
      - run: /tmp/subtap-wheel-smoke/bin/python -m pip install dist/*.whl
      - run: /tmp/subtap-wheel-smoke/bin/subtap version
      - run: /tmp/subtap-wheel-smoke/bin/subtap doctor
      - run: /tmp/subtap-wheel-smoke/bin/python -c "import textual"
      - run: /tmp/subtap-wheel-smoke/bin/subtap tui --help
      - run: /tmp/subtap-wheel-smoke/bin/subtap run --help | grep -- --tui

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum * > SHA256SUMS
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

  attest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/
      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2  # v2.2.3
        with:
          subject-path: dist/

  github-release:
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/
      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: dist/*

  publish:
    needs: [test, build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1

  homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: R-jed/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Update formula version and SHA256
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          SHA256=$(curl -sL "https://pypi.org/pypi/subtap/${VERSION}/json" | python3 -c "import sys,json; d=json.load(sys.stdin); print([f['digests']['sha256'] for f in d['urls'] if f['packagetype']=='sdist'][0])")
          sed -i "s|url \".*\"|url \"https://files.pythonhosted.org/packages/source/s/subtap/subtap-${VERSION}.tar.gz\"|" Formula/subtap.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/subtap.rb
      - name: Validate formula (audit + install + test)
        run: |
          brew audit --strict R-jed/tap/subtap
          brew install R-jed/tap/subtap
          brew test R-jed/tap/subtap
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update subtap to ${GITHUB_REF#refs/tags/v}"
          git push
