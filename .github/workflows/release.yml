name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.release.outputs.version }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - id: release
        name: Validate tag and package version
        run: python scripts/release_metadata.py

  test:
    needs: metadata
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8
      - run: brew install ffmpeg
      - name: Verify source and package
        run: ./scripts/check.sh
      - run: python -m venv /tmp/subtap-wheel-smoke
      - run: /tmp/subtap-wheel-smoke/bin/python -m pip install dist/*.whl
      - run: /tmp/subtap-wheel-smoke/bin/subtap version
      - run: /tmp/subtap-wheel-smoke/bin/subtap doctor
      - run: /tmp/subtap-wheel-smoke/bin/python -c "import textual"
      - run: /tmp/subtap-wheel-smoke/bin/subtap tui --help
      - run: /tmp/subtap-wheel-smoke/bin/subtap run --help

  offline-acceptance:
    needs: [metadata, build]
    runs-on: [self-hosted, macOS, ARM64, subtap-release]
    timeout-minutes: 45
    env:
      NODE_OPTIONS: --use-system-ca
      SUBTAP_SMOKE_AUDIO_DIR: ${{ vars.SUBTAP_SMOKE_AUDIO_DIR }}
      SUBTAP_SMOKE_MODEL_ROOT: ${{ vars.SUBTAP_SMOKE_MODEL_ROOT }}
      SUBTAP_SMOKE_REFERENCE_SRT: ${{ vars.SUBTAP_SMOKE_REFERENCE_SRT }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Download the package being released
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: ${{ runner.temp }}/subtap-dist
      - name: Validate private release assets
        run: |
          command -v python3.13
          command -v uv
          test -n "$SUBTAP_SMOKE_AUDIO_DIR" || {
            echo "::error::Repository variable SUBTAP_SMOKE_AUDIO_DIR is required"
            exit 1
          }
          test -n "$SUBTAP_SMOKE_MODEL_ROOT" || {
            echo "::error::Repository variable SUBTAP_SMOKE_MODEL_ROOT is required"
            exit 1
          }
          test -n "$SUBTAP_SMOKE_REFERENCE_SRT" || {
            echo "::error::Repository variable SUBTAP_SMOKE_REFERENCE_SRT is required"
            exit 1
          }
      - name: Install release acceptance dependencies
        run: |
          brew list ffmpeg >/dev/null 2>&1 || brew install ffmpeg
          rm -rf "$RUNNER_TEMP/subtap-release-acceptance"
          uv venv "$RUNNER_TEMP/subtap-release-acceptance" \
            --python "$(command -v python3.13)"
          uv pip install \
            --python "$RUNNER_TEMP/subtap-release-acceptance/bin/python" \
            "$RUNNER_TEMP"/subtap-dist/*.whl
      - name: Run real 1.7B local-only pipeline acceptance
        run: |
          SUBTAP_SMOKE_SUBTAP_BIN="$RUNNER_TEMP/subtap-release-acceptance/bin/subtap" \
            ./scripts/smoke_offline.sh

  build:
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8
      - name: Build package
        run: uv build
      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum * > SHA256SUMS
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

  homebrew:
    needs: metadata
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8
      - name: Install Formula external dependencies
        run: brew install ffmpeg numpy scipy
      - name: Build sealed offline wheelhouse and Formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          uv sync --extra dev
          mkdir -p homebrew-artifacts
          uv run python scripts/homebrew_wheelhouse.py build \
            --output homebrew-artifacts/wheelhouse \
            --policy packaging/homebrew/license-policy.json \
            --lock-path uv.lock
          wheelhouse="$(find homebrew-artifacts -name '*-wheelhouse.tar.gz' -print -quit)"
          test -n "$wheelhouse"
          shasum -a 256 "$wheelhouse" > "$wheelhouse.sha256"
          verification=/tmp/subtap-sentencepiece-verification
          mkdir -p "$verification"
          gh release download v0.2.2 \
            --repo google/sentencepiece \
            --pattern multiple.intoto.jsonl \
            --dir "$verification"
          gh api repos/google/sentencepiece/releases/tags/v0.2.2 \
            > "$verification/release.json"
          gh release download v2.7.1 \
            --repo slsa-framework/slsa-verifier \
            --pattern slsa-verifier-darwin-arm64 \
            --dir "$verification"
          chmod +x "$verification/slsa-verifier-darwin-arm64"
          sentencepiece_wheel="$(find homebrew-artifacts/wheelhouse/wheels \
            -name 'sentencepiece-0.2.2-cp313-cp313-macosx_11_0_arm64.whl' \
            -print -quit)"
          test -n "$sentencepiece_wheel"
          uv run python scripts/homebrew_wheelhouse.py verify-sentencepiece \
            --wheel "$sentencepiece_wheel" \
            --bundle "$verification/multiple.intoto.jsonl" \
            --notices packaging/homebrew/third-party \
            --verifier "$verification/slsa-verifier-darwin-arm64" \
            --release-metadata "$verification/release.json" \
            --policy packaging/homebrew/license-policy.json \
            --formal-release
          uv run python scripts/render_homebrew_formula.py \
            --manifest homebrew-artifacts/wheelhouse/manifest.json \
            --template packaging/homebrew/subtap.rb.in \
            --wheelhouse-url "file://$(pwd)/$wheelhouse" \
            --wheelhouse "$wheelhouse" \
            --output /tmp/Subtap.rb
          local_tap="subtap/release-test"
          brew tap-new "$local_tap"
          tap_dir="$(brew --repository "$local_tap")"
          mkdir -p "$tap_dir/Formula"
          cp /tmp/Subtap.rb "$tap_dir/Formula/subtap.rb"
          brew install "$local_tap/subtap"
          brew test "$local_tap/subtap"
          brew uninstall subtap
          brew untap "$local_tap"
          uv run python scripts/render_homebrew_formula.py \
            --manifest homebrew-artifacts/wheelhouse/manifest.json \
            --template packaging/homebrew/subtap.rb.in \
            --wheelhouse-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/$(basename "$wheelhouse")" \
            --wheelhouse "$wheelhouse" \
            --output homebrew-artifacts/subtap.rb
          ruby -c homebrew-artifacts/subtap.rb
      - name: Upload Homebrew assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: homebrew
          path: homebrew-artifacts/

  attest:
    needs: [build, homebrew]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: release-assets/dist/
      - name: Download Homebrew assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: homebrew
          path: release-assets/homebrew/
      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2  # v2.2.3
        with:
          subject-path: release-assets/

  github-release:
    needs: [metadata, test, offline-acceptance, build, homebrew, attest]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: release-assets/dist/
      - name: Download Homebrew assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: homebrew
          path: release-assets/homebrew/
      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: |
            release-assets/dist/*.whl
            release-assets/dist/*.tar.gz
            release-assets/homebrew/*.tar.gz
            release-assets/homebrew/*.tar.gz.sha256
            release-assets/homebrew/subtap.rb
          prerelease: ${{ needs.metadata.outputs.is_prerelease }}

  publish:
    if: ${{ needs.metadata.outputs.is_prerelease == 'false' }}
    needs: [metadata, test, offline-acceptance, build, attest]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write  # trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
