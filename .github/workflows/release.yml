name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: brew install ffmpeg
      - run: pip install -e ".[dev,ai]"
      - name: Verify source and package
        run: ./scripts/check.sh
      - run: python -m venv /tmp/subtap-wheel-smoke
      - run: /tmp/subtap-wheel-smoke/bin/python -m pip install dist/*.whl
      - run: /tmp/subtap-wheel-smoke/bin/subtap version
      - run: /tmp/subtap-wheel-smoke/bin/subtap doctor
      - run: /tmp/subtap-wheel-smoke/bin/python -c "import textual"
      - run: /tmp/subtap-wheel-smoke/bin/subtap tui --help
      - run: /tmp/subtap-wheel-smoke/bin/subtap run --help | grep -- --tui

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish:
    needs: [test, build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: R-jed/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Update formula version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # 自动更新 formula 中的版本号和 sha256
          # 需要先获取 PyPI 包的 sha256
          SHA256=$(curl -sL "https://pypi.org/pypi/subtap/${VERSION}/json" | python3 -c "import sys,json; d=json.load(sys.stdin); print([f['digests']['sha256'] for f in d['urls'] if f['packagetype']=='sdist'][0])")
          sed -i "s|url \".*\"|url \"https://files.pythonhosted.org/packages/source/s/subtap/subtap-${VERSION}.tar.gz\"|" Formula/subtap.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/subtap.rb
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update subtap to ${GITHUB_REF#refs/tags/v}"
          git push
