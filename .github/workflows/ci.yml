name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: brew install ffmpeg
      - run: pip install -e ".[dev,ai]"
      - run: black --check src tests
      - run: mypy src/subtap
      - run: pytest -q -p no:cacheprovider
